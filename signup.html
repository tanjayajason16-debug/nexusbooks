<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — NexusBooks</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.1), transparent), radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.1), transparent); }
    .auth-card { width: min(480px, 100%); padding: 40px; }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-logo { display: inline-flex; align-items: center; gap: 10px; font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; }
    .auth-title { font-size: 1.5rem; margin-bottom: 8px; }
    .auth-sub { color: var(--text-3); font-size: 0.9rem; }
    .auth-form { display: flex; flex-direction: column; gap: 20px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-3); }
    .auth-footer a { color: var(--purple); font-weight: 600; }
    
    .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
    .role-option { border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: var(--tr); }
    .role-option:hover { background: var(--surface); }
    .role-option.active { border-color: var(--purple); background: rgba(139, 92, 246, 0.05); }
    .role-name { font-weight: 600; font-size: 0.9rem; }
    .role-desc { font-size: 0.75rem; color: var(--text-3); }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <main class="auth-page">
    <div class="glass auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">📚 Nexus<b>Books</b></a>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-sub">Join the marketplace for digital knowledge.</p>
      </div>

      <form class="auth-form" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="johndoe" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-input" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label class="form-label">I want to...</label>
          <div class="role-selector">
            <div class="role-option active" onclick="selectRole(false, this)">
              <div class="role-name">📖 Read</div>
              <div class="role-desc">Browse and buy books</div>
            </div>
            <div class="role-option" id="seller-option" onclick="selectRole(true, this)">
              <div class="role-name">🎨 Create</div>
              <div class="role-desc">Sell my own ebooks</div>
            </div>
          </div>
        </div>

        <input type="hidden" name="is_seller" id="is_seller_input" value="false" />
        
        <button type="submit" class="btn btn--primary btn--lg" id="submit-btn" style="width: 100%; justify-content: center;">Sign Up</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    function selectRole(isSeller, el) {
      document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('is_seller_input').value = isSeller;
    }

    // Auto-select seller if coming from seller CTA
    if (new URLSearchParams(window.location.search).get('seller') === '1') {
      selectRole(true, document.getElementById('seller-option'));
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const formData = new FormData(e.target);
      
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        await Auth.signUp(
          formData.get('email'), 
          formData.get('password'), 
          formData.get('username'),
          formData.get('is_seller') === 'true'
        );
        UI.showToast('Account created! Please check your email.', 'success');
        setTimeout(() => window.location.href = ROUTES.login, 2000);
      } catch (err) {
        UI.showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign Up';
      }
    }
  </script>
</body>
</html>
