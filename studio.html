<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Studio — NexusBooks</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .studio-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; margin-top: 40px; }
    .studio-nav { display: flex; flex-direction: column; gap: 8px; }
    .studio-nav-item { padding: 12px 16px; border-radius: var(--r-md); color: var(--text-2); font-weight: 500; transition: var(--tr); cursor: pointer; }
    .studio-nav-item:hover { background: var(--surface); color: var(--text); }
    .studio-nav-item.active { background: var(--purple); color: #fff; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 24px; }
    .stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text); margin-top: 8px; }
    .stat-label { font-size: 0.85rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }

    .book-list-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    .book-list-table th { text-align: left; padding: 16px; color: var(--text-3); font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    .book-list-table td { padding: 16px; border-bottom: 1px solid var(--border); }
    .book-row-title { font-weight: 600; color: var(--text); }
    .status-badge { padding: 4px 10px; border-radius: var(--r-pill); font-size: 0.75rem; font-weight: 600; }
    .status-published { background: rgba(16, 185, 129, 0.1); color: var(--green); }
    .status-draft { background: rgba(245, 158, 11, 0.1); color: var(--amber); }

    .upload-modal { display: none; position: fixed; inset: 0; z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .upload-modal.open { display: flex; }
    .upload-panel { background: var(--void2); border: 1px solid var(--border); border-radius: var(--r-lg); width: min(600px, 100%); max-height: 90vh; overflow-y: auto; padding: 32px; position: relative; z-index: 1; }
    
    .dropzone { border: 2px dashed var(--border); border-radius: var(--r-md); padding: 40px; text-align: center; color: var(--text-3); transition: var(--tr); cursor: pointer; margin-bottom: 20px; }
    .dropzone:hover { border-color: var(--purple); background: rgba(139, 92, 246, 0.05); }
    .dropzone.active { border-color: var(--blue); background: rgba(6, 182, 212, 0.05); }

    @media (max-width: 800px) {
      .studio-layout { grid-template-columns: 1fr; }
      .studio-nav { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
    }
  </style>
  <!-- Vercel Web Analytics -->
  <script src="js/analytics.js"></script>
</head>
<body>
  <header id="navbar"></header>
  <div id="toast-container"></div>

  <main class="page">
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h1 class="section-title">🎨 Creator <span>Studio</span></h1>
          <button class="btn btn--primary" onclick="toggleUploadModal(true)">+ Upload New Book</button>
        </div>

        <div class="studio-layout">
          <aside class="studio-nav">
            <div class="studio-nav-item active">Dashboard</div>
            <div class="studio-nav-item">My Books</div>
            <div class="studio-nav-item">Sales & Revenue</div>
            <div class="studio-nav-item">Settings</div>
          </aside>

          <div class="studio-content">
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-val" id="stat-revenue">$0.00</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Total Sales</div>
                <div class="stat-val" id="stat-sales">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Active Books</div>
                <div class="stat-val" id="stat-active-books">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Avg. Rating</div>
                <div class="stat-val" id="stat-rating">0.0</div>
              </div>
            </div>

            <div class="glass" style="padding: 24px;">
              <h3 style="margin-bottom: 20px;">Recent Books</h3>
              <div style="overflow-x: auto;">
                <table class="book-list-table">
                  <thead>
                    <tr>
                      <th>Book Title</th>
                      <th>Category</th>
                      <th>Price</th>
                      <th>Sales</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="books-list-body">
                    <tr><td colspan="6"><div class="loader"><div class="loader__ring"></div></div></td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Upload Modal -->
  <div id="upload-modal" class="upload-modal">
    <div class="reader-backdrop" onclick="toggleUploadModal(false)"></div>
    <div class="upload-panel">
      <h2 style="margin-bottom: 24px;">Upload New Book</h2>
      <form id="upload-form" onsubmit="handleUpload(event)" style="display: flex; flex-direction: column; gap: 20px;">
        <div class="form-group">
          <label class="form-label">Book Title</label>
          <input type="text" name="title" class="form-input" placeholder="e.g. Master React in 30 Days" required />
        </div>
        
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-input" placeholder="What is your book about?" required></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select name="category" class="form-input">
              ${APP_CONFIG.categories.slice(1).map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Price ($)</label>
            <input type="number" name="price" step="0.01" min="0" class="form-input" value="0.00" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Cover Image</label>
          <div class="dropzone" id="cover-dropzone">
            <span>📸 Click to upload cover (JPG/PNG)</span>
            <input type="file" id="cover-file" accept="image/*" style="display:none" />
          </div>
          <div id="cover-preview" style="display:none; margin-top:10px;"><img src="" style="height:100px; border-radius:8px;" /></div>
        </div>

        <div class="form-group">
          <label class="form-label">Book File (PDF/EPUB)</label>
          <div class="dropzone" id="book-dropzone">
            <span>📄 Click to upload book file</span>
            <input type="file" id="book-file" accept=".pdf,.epub" style="display:none" />
          </div>
          <div id="book-file-info" style="display:none; font-size:0.85rem; color:var(--green);">File selected!</div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 10px;">
          <button type="button" class="btn btn--ghost" onclick="toggleUploadModal(false)">Cancel</button>
          <button type="submit" class="btn btn--primary" id="submit-btn">Upload & Publish</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/books.js"></script>
  <script src="js/payments.js"></script>
  <script>
    async function init() {
      const seller = await Auth.requireSeller();
      if (!seller) return;
      
      UI.renderNavbar('studio');
      loadDashboard();

      // Dropzone logic
      setupDropzone('cover-dropzone', 'cover-file', (file) => {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById('cover-preview').style.display = 'block';
          document.getElementById('cover-preview').querySelector('img').src = e.target.result;
        };
        reader.readAsDataURL(file);
      });

      setupDropzone('book-dropzone', 'book-file', (file) => {
        document.getElementById('book-file-info').style.display = 'block';
        document.getElementById('book-file-info').textContent = `📄 ${file.name} selected`;
      });
    }

    async function loadDashboard() {
      try {
        const books = await Books.fetchSellerBooks(Auth.user.id);
        const { total: revenue } = await Payments.getSellerRevenue(Auth.user.id);
        const sales = books.reduce((sum, b) => sum + (b.downloads || 0), 0);
        const rating = books.length ? books.reduce((sum, b) => sum + (b.rating_avg || 0), 0) / books.length : 0;

        document.getElementById('stat-revenue').textContent = UI.formatCurrency(revenue);
        document.getElementById('stat-sales').textContent = sales.toLocaleString();
        document.getElementById('stat-active-books').textContent = books.length;
        document.getElementById('stat-rating').textContent = rating.toFixed(1);

        const tbody = document.getElementById('books-list-body');
        if (books.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;">No books uploaded yet.</td></tr>';
          return;
        }

        tbody.innerHTML = books.map(b => `
          <tr>
            <td><div class="book-row-title">${b.title}</div></td>
            <td>${b.category}</td>
            <td>${UI.formatCurrency(b.price)}</td>
            <td>${b.downloads || 0}</td>
            <td><span class="status-badge ${b.is_published ? 'status-published' : 'status-draft'}">${b.is_published ? 'Published' : 'Draft'}</span></td>
            <td>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn--ghost btn--sm" onclick="window.location.href='book.html?id=${b.id}'">View</button>
                <button class="btn btn--outline btn--sm" style="border-color:var(--pink);color:var(--pink);">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        UI.showToast('Failed to load dashboard', 'error');
      }
    }

    function toggleUploadModal(open) {
      document.getElementById('upload-modal').classList.toggle('open', open);
    }

    function setupDropzone(id, inputId, onSelect) {
      const dz = document.getElementById(id);
      const input = document.getElementById(inputId);
      dz.onclick = () => input.click();
      input.onchange = () => { if (input.files[0]) onSelect(input.files[0]); };
      
      dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('active'); };
      dz.ondragleave = () => dz.classList.remove('active');
      dz.ondrop = (e) => {
        e.preventDefault();
        dz.classList.remove('active');
        if (e.dataTransfer.files[0]) {
          input.files = e.dataTransfer.files;
          onSelect(e.dataTransfer.files[0]);
        }
      };
    }

    async function handleUpload(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const formData = new FormData(e.target);
      const coverFile = document.getElementById('cover-file').files[0];
      const bookFile = document.getElementById('book-file').files[0];

      if (!coverFile || !bookFile) {
        UI.showToast('Please select both cover and book files', 'warning');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Uploading...';

      try {
        const bookData = {
          title: formData.get('title'),
          description: formData.get('description'),
          category: formData.get('category'),
          price: parseFloat(formData.get('price')),
          is_published: true
        };

        const book = await Books.createBook(bookData);
        const coverUrl = await Books.uploadCover(coverFile, book.id);
        const fileUrl = await Books.uploadFile(bookFile, book.id);
        
        await Books.updateBook(book.id, { cover_url: coverUrl, file_url: fileUrl, preview_url: fileUrl }); // Preview same as file for simplicity, in real app extract pages

        UI.showToast('Book published successfully!', 'success');
        toggleUploadModal(false);
        loadDashboard();
      } catch (e) {
        UI.showToast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Upload & Publish';
      }
    }

    init();
  </script>
</body>
</html>
