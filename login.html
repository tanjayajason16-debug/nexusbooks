<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NexusBooks</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.1), transparent), radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.1), transparent); }
    .auth-card { width: min(440px, 100%); padding: 40px; }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-logo { display: inline-flex; align-items: center; gap: 10px; font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; }
    .auth-title { font-size: 1.5rem; margin-bottom: 8px; }
    .auth-sub { color: var(--text-3); font-size: 0.9rem; }
    .auth-form { display: flex; flex-direction: column; gap: 20px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-3); }
    .auth-footer a { color: var(--purple); font-weight: 600; }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <main class="auth-page">
    <div class="glass auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">📚 Nexus<b>Books</b></a>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Enter your credentials to access your library.</p>
      </div>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-input" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn--primary btn--lg" id="submit-btn" style="width: 100%; justify-content: center;">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const formData = new FormData(e.target);
      
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        await Auth.signIn(formData.get('email'), formData.get('password'));
        UI.showToast('Logged in successfully!', 'success');
        setTimeout(() => window.location.href = ROUTES.library, 1000);
      } catch (err) {
        UI.showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }
  </script>
</body>
</html>
